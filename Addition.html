<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add Numbers – 20 Iterations</title>
</head>
<body>
    <h1>Sum of up to 20 numbers</h1>
    <p>Type a number and press **Add**. After 20 entries the running total
       is shown and no more values are accepted.</p>

    <input type="number" id="num" />
    <button id="addBtn">Add</button>

    <p>Entries: <span id="count">0</span>/20</p>
    <p>Total: <span id="sum">0</span></p>

    <script>
        let sum = 0;
        let count = 0;

        document.getElementById('addBtn').addEventListener('click', () => {
            const n = parseFloat(document.getElementById('num').value);
            if (!isNaN(n) && count < 20) {
                sum += n;
                count++;
                document.getElementById('sum').textContent = sum;
                document.getElementById('count').textContent = count;
                document.getElementById('num').value = '';
                if (count === 20) {
                    alert('Reached 20 iterations. Final sum: ' + sum);
                }
            }
        });
    </script>
</body>
</html>
